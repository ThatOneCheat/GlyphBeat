name: glyph_visualizer
description: Accurate FFT-based music visualizer for Nothing Phone (3a) Pro
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  permission_handler: ^11.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true

  fonts:
    - family: Space Grotesk
      fonts:
        - asset: fonts/SpaceGrotesk.ttf
    - family: JetBrains Mono
      fonts:
        - asset: fonts/JetBrainsMono.ttf
